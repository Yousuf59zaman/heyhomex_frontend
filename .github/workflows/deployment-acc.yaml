name: Acceptance deployment 

on:
    push:
        branches:
            - acceptance


jobs:
    install-build-application:
        name: Install and Build the application
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: Build App artifacts using pnpm
              uses: pnpm/action-setup@v4
            - run: |
                echo API_BASE_URL="${{ vars.ACC_API_BASE_URL }}" >> .env
                echo FIREBASE_API_KEY="${{ secrets.ACC_FIREBASE_API_KEY }}" >> .env
                echo FIREBASE_AUTH_DOMAIN="${{ secrets.ACC_FIREBASE_AUTH_DOMAIN }}" >> .env
                echo FIREBASE_PROJECT_ID="${{ secrets.ACC_FIREBASE_PROJECT_ID }}" >> .env
                echo FIREBASE_STORAGE_BUCKET="${{ secrets.ACC_FIREBASE_STORAGE_BUCKET }}" >> .env
                echo FIREBASE_MESSAGING_SENDER_ID="${{ secrets.ACC_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
                echo FIREBASE_APP_ID="${{ secrets.ACC_FIREBASE_APP_ID }}" >> .env
                echo NUXT_PUBLIC_JWPLAYER_KE="${{ secrets.ACC_NUXT_PUBLIC_JWPLAYER_KE }}" >> .env
                echo NUXT_PUBLIC_JWPLAYER_LIBRARY_UR="${{ secrets.ACC_NUXT_PUBLIC_JWPLAYER_LIBRARY_UR }}" >> .env
                echo NUXT_PUBLIC_JWPLAYER_DEVMODE="${{ vars.ACC_NUXT_PUBLIC_JWPLAYER_DEVMODE }}" >> .env
                echo NUXT_PUBLIC_JWPLAYER_DEVMODE_DEMO_LIBRARY_UR="${{ secrets.ACC_NUXT_PUBLIC_JWPLAYER_DEVMODE_DEMO_LIBRARY_UR }}" >> .env
                touch .env
                pnpm install
                pnpm run build
                tar -czf output.tar.gz .output
            - name: Store app artifacts for distribution
              uses: actions/upload-artifact@v4
              with:
                name: app-artifacts
                path: output.tar.gz

    deploy-application:
        needs: install-build-application
        name: Prepare release on server
        runs-on: ubuntu-latest
        steps:
            - uses: actions/download-artifact@v4
              with:
                name: app-artifacts
            - name: Upload app-artifacts
              uses: appleboy/scp-action@master
              with:
                host: ${{ secrets.ACC_SERVER_SSH_HOST }}
                port: ${{ secrets.ACC_SERVER_SSH_PORT }}
                username: ${{ secrets.ACC_SERVER_SSH_USER }}
                key: ${{ secrets.ACC_SERVER_SSH_KEY }}
                source: output.tar.gz
                target: ${{ vars.ACC_ARTIFACT_DIR }}

            - name: Extract archive and create directories
              uses: appleboy/ssh-action@master
              with:
                host: ${{ secrets.ACC_SERVER_SSH_HOST }}
                port: ${{ secrets.ACC_SERVER_SSH_PORT }}
                username: ${{ secrets.ACC_SERVER_SSH_USER }}
                key: ${{ secrets.ACC_SERVER_SSH_KEY }}
                script: |
                    cd ${{ vars.ACC_APP_DIR }}
                    git pull --autostash
                    echo "Renaming existing .output folder to .output_old"
                    mv .output .output_$(date +%Y%m%d%H%M%S)
                    tar -xzf ${{ vars.ACC_ARTIFACT_DIR }}/output.tar.gz -C ${{ vars.ACC_APP_DIR }}/
                    rm ${{ vars.ACC_ARTIFACT_DIR }}/output.tar.gz
                    pm2 restart ${{ vars.ACC_PM2_SL }}
